<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="ecom-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#ecom-bg)" rx="12"/>
  <!-- Shopping cart -->
  <path d="M150 60 L170 60 L195 120 L250 120" fill="none" stroke="#34d399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="200" cy="135" r="7" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <circle cx="240" cy="135" r="7" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <!-- Items in cart -->
  <rect x="178" y="75" width="55" height="40" rx="5" fill="#1e293b" stroke="#34d399" stroke-width="1.5"/>
  <rect x="183" y="80" width="20" height="15" rx="3" fill="#34d399" opacity="0.3"/>
  <rect x="207" y="80" width="20" height="6" rx="2" fill="#4b5563"/>
  <rect x="207" y="90" width="15" height="4" rx="1" fill="#4b5563"/>
  <!-- Price tag -->
  <rect x="280" y="55" width="70" height="30" rx="6" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="1.5"/>
  <text x="315" y="75" text-anchor="middle" fill="#34d399" font-family="monospace" font-size="14" font-weight="bold">$99</text>
  <!-- Stars -->
  <text x="280" y="100" fill="#fbbf24" font-size="12">★★★★★</text>
  <text x="200" y="190" text-anchor="middle" fill="#6ee7b7" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">React + Node.js + MongoDB</text>
</svg>
