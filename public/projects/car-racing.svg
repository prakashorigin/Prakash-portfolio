<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="car-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#car-bg)" rx="12"/>
  <!-- Road -->
  <rect x="130" y="0" width="140" height="200" fill="#1e293b"/>
  <line x1="200" y1="0" x2="200" y2="30" stroke="#fbbf24" stroke-width="3" stroke-dasharray="15,10"/>
  <line x1="200" y1="50" x2="200" y2="80" stroke="#fbbf24" stroke-width="3" stroke-dasharray="15,10"/>
  <line x1="200" y1="100" x2="200" y2="130" stroke="#fbbf24" stroke-width="3" stroke-dasharray="15,10"/>
  <line x1="200" y1="150" x2="200" y2="180" stroke="#fbbf24" stroke-width="3" stroke-dasharray="15,10"/>
  <!-- Player car -->
  <rect x="175" y="130" width="30" height="50" rx="6" fill="#ef4444"/>
  <rect x="178" y="135" width="24" height="12" rx="3" fill="#1e293b"/>
  <circle cx="180" cy="175" r="5" fill="#334155"/>
  <circle cx="200" cy="175" r="5" fill="#334155"/>
  <!-- Enemy car -->
  <rect x="155" y="30" width="26" height="45" rx="5" fill="#3b82f6"/>
  <rect x="158" y="55" width="20" height="10" rx="2" fill="#1e293b"/>
  <!-- Speed lines -->
  <line x1="165" y1="190" x2="165" y2="200" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="215" y1="190" x2="215" y2="200" stroke="white" stroke-width="1" opacity="0.3"/>
  <text x="50" y="30" fill="#fbbf24" font-family="monospace" font-size="13" opacity="0.7">SPEED: 120</text>
  <text x="200" y="195" text-anchor="middle" fill="#fca5a5" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">JavaScript + Canvas</text>
</svg>
