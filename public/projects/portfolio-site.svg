<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="port-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#port-bg)" rx="12"/>
  <!-- Browser window -->
  <rect x="80" y="30" width="240" height="140" rx="8" fill="#1e293b" stroke="#6d28d9" stroke-width="1.5"/>
  <rect x="80" y="30" width="240" height="20" rx="8" fill="#334155"/>
  <circle cx="95" cy="40" r="4" fill="#ef4444"/><circle cx="108" cy="40" r="4" fill="#fbbf24"/><circle cx="121" cy="40" r="4" fill="#22c55e"/>
  <!-- Content lines -->
  <rect x="95" y="60" width="80" height="8" rx="2" fill="#6d28d9" opacity="0.5"/>
  <rect x="95" y="75" width="120" height="5" rx="2" fill="#4b5563"/>
  <rect x="95" y="85" width="100" height="5" rx="2" fill="#4b5563"/>
  <!-- Cards -->
  <rect x="95" y="100" width="60" height="55" rx="5" fill="#374151"/><rect x="95" y="100" width="60" height="25" rx="5" fill="#6d28d9" opacity="0.3"/>
  <rect x="165" y="100" width="60" height="55" rx="5" fill="#374151"/><rect x="165" y="100" width="60" height="25" rx="5" fill="#06b6d4" opacity="0.3"/>
  <rect x="235" y="100" width="60" height="55" rx="5" fill="#374151"/><rect x="235" y="100" width="60" height="25" rx="5" fill="#8b5cf6" opacity="0.3"/>
  <!-- Particles -->
  <circle cx="40" cy="60" r="2" fill="#6d28d9" opacity="0.4"/>
  <circle cx="360" cy="80" r="1.5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="50" cy="150" r="1.5" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="350" cy="40" r="2" fill="#6d28d9" opacity="0.3"/>
  <text x="200" y="190" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">Next.js + Tailwind + Framer Motion</text>
