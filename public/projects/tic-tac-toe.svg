<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="ttt-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#ttt-bg)" rx="12"/>
  <!-- Grid -->
  <line x1="170" y1="40" x2="170" y2="165" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="230" y1="40" x2="230" y2="165" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="80" x2="270" y2="80" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="125" x2="270" y2="125" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
  <!-- X marks -->
  <g stroke="#f472b6" stroke-width="3.5" stroke-linecap="round">
    <line x1="140" y1="50" x2="160" y2="70"/><line x1="160" y1="50" x2="140" y2="70"/>
    <line x1="140" y1="135" x2="160" y2="155"/><line x1="160" y1="135" x2="140" y2="155"/>
  </g>
  <!-- O marks -->
  <circle cx="200" cy="60" r="13" fill="none" stroke="#22d3ee" stroke-width="3.5"/>
  <circle cx="200" cy="145" r="13" fill="none" stroke="#22d3ee" stroke-width="3.5"/>
  <circle cx="250" cy="102" r="13" fill="none" stroke="#22d3ee" stroke-width="3.5"/>
  <!-- X in center -->
  <g stroke="#f472b6" stroke-width="3.5" stroke-linecap="round">
    <line x1="189" y1="92" x2="211" y2="114"/><line x1="211" y1="92" x2="189" y2="114"/>
  </g>
  <text x="200" y="190" text-anchor="middle" fill="#c4b5fd" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">Python + HTML + CSS</text>
</svg>
