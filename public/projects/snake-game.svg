<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="snake-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:0.4" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#snake-bg)" rx="12"/>
  <!-- Grid -->
  <g opacity="0.1" stroke="#22c55e" stroke-width="0.5">
    <line x1="0" y1="40" x2="400" y2="40"/><line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/><line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/><line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/><line x1="320" y1="0" x2="320" y2="200"/>
  </g>
  <!-- Snake body -->
  <rect x="160" y="80" width="20" height="20" rx="4" fill="#22c55e"/>
  <rect x="180" y="80" width="20" height="20" rx="4" fill="#16a34a"/>
  <rect x="200" y="80" width="20" height="20" rx="4" fill="#15803d"/>
  <rect x="200" y="100" width="20" height="20" rx="4" fill="#166534"/>
  <rect x="220" y="100" width="20" height="20" rx="4" fill="#14532d"/>
  <!-- Snake eyes -->
  <circle cx="167" cy="87" r="3" fill="white"/><circle cx="167" cy="87" r="1.5" fill="#0f172a"/>
  <circle cx="175" cy="87" r="3" fill="white"/><circle cx="175" cy="87" r="1.5" fill="#0f172a"/>
  <!-- Apple -->
  <circle cx="300" cy="90" r="10" fill="#ef4444"/>
  <path d="M300 80 Q305 70 302 68" fill="none" stroke="#22c55e" stroke-width="2"/>
  <!-- Score -->
  <text x="30" y="30" fill="#22c55e" font-family="monospace" font-size="14" opacity="0.7">Score: 420</text>
  <text x="200" y="185" text-anchor="middle" fill="#a3e635" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">React + Node.js + Canvas</text>
</svg>
