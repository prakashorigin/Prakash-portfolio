<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="rps-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="#0f172a" rx="12"/>
  <rect width="400" height="200" fill="url(#rps-bg)" rx="12"/>
  <!-- Rock -->
  <circle cx="120" cy="90" r="30" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="120" cy="90" r="15" fill="#fbbf24" opacity="0.3"/>
  <text x="120" y="95" text-anchor="middle" fill="#fbbf24" font-size="24">✊</text>
  <!-- Paper -->
  <circle cx="200" cy="90" r="30" fill="none" stroke="#34d399" stroke-width="2.5"/>
  <text x="200" y="95" text-anchor="middle" fill="#34d399" font-size="24">✋</text>
  <!-- Scissors -->
  <circle cx="280" cy="90" r="30" fill="none" stroke="#f472b6" stroke-width="2.5"/>
  <text x="280" y="95" text-anchor="middle" fill="#f472b6" font-size="24">✌️</text>
  <!-- VS text -->
  <text x="160" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold" opacity="0.4">VS</text>
  <text x="240" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold" opacity="0.4">VS</text>
  <!-- Score -->
  <text x="200" y="35" text-anchor="middle" fill="#fde68a" font-family="monospace" font-size="13" opacity="0.7">Player: 3 | AI: 1</text>
  <text x="200" y="185" text-anchor="middle" fill="#fcd34d" font-family="Arial" font-size="11" font-weight="bold" opacity="0.6">Python + Game Logic</text>
</svg>
